<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Guestbook 📖</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #c9d1d9;
      font-family: 'Courier New', monospace;
      min-height: 100vh; padding: 2rem;
    }
    h1 { color: #58a6ff; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 2rem; }
    .form-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 1.5rem; max-width: 600px; margin-bottom: 2rem;
    }
    textarea {
      width: 100%; min-height: 80px; padding: 0.5rem;
      background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
      color: #c9d1d9; font-family: inherit; resize: vertical;
      margin-bottom: 0.75rem;
    }
    textarea:focus { outline: none; border-color: #58a6ff; }
    button {
      padding: 0.5rem 1.5rem; background: #238636;
      border: none; border-radius: 4px; color: #fff;
      cursor: pointer; font-family: inherit;
    }
    button:hover { background: #2ea043; }
    h2 { color: #8b949e; font-size: 1rem; margin-bottom: 1rem; }
    #comments-list { max-width: 600px; }
    .comment {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 6px; padding: 1rem; margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }
    .hint {
      max-width: 600px; padding: 0.75rem; background: #1c2128;
      border-left: 3px solid #d29922; font-size: 0.78rem; color: #8b949e;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <h1>📖 The Guestbook</h1>
  <p class="subtitle">Deja tu mensaje para la comunidad. Un admin revisa los comentarios cada 30 segundos.</p>

  <div class="hint">
    💡 Hay un admin-bot con una cookie muy valiosa que visita esta página periódicamente.
  </div>

  <div class="form-card">
    <form id="comment-form" action="comment" method="POST">
      <textarea name="content" placeholder="Escribe tu comentario..."></textarea>
      <button type="submit">Publicar comentario</button>
    </form>
  </div>

  <h2>💬 Comentarios recientes</h2>
  <div id="comments-list">
    <p style="color:#8b949e; font-size:0.85rem;">Cargando comentarios...</p>
  </div>

  <script>
    // Carga y renderiza comentarios — innerHTML sin sanitizar (stored XSS intencional)
    async function loadComments() {
      try {
        const res = await fetch('comments');
        const html = await res.text();
        document.getElementById('comments-list').innerHTML = html;
      } catch (e) {
        console.error('Error cargando comentarios', e);
      }
    }
    loadComments();
    setInterval(loadComments, 10000);
  </script>
</body>
</html>
