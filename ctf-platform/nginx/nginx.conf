# nginx/nginx.conf — CTF Platform
# Único punto de entrada público: :80
# Sirve estáticos Astro directamente + proxea /api/ /ws/ /admin/ al backend

upstream backend {
    server backend:8000;
}

# Macro de headers de seguridad — repetida en cada location que tenga add_header propio
# (nginx cancela herencia del server block cuando un location define su propio add_header)
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# Macro de headers de seguridad — repetida en cada location que tenga add_header propio
# (nginx cancela herencia del server block cuando un location define su propio add_header)
map $uri $csp {
    default "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self' https://fonts.gstatic.com;";
}

server {
    listen 8080;
    server_name _;
    absolute_redirect off;

    root /usr/share/nginx/html;
    client_max_body_size 10m;

    # ── WebSocket → Django Channels ──────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              backend;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 86400s;
    }

    # ── API → Django/Daphne ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              backend;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }

    # ── Django admin ─────────────────────────────────────────────────────────
    location /django-admin/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              backend;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header   X-Forwarded-Host  $host;
    }

    # ── Django static (admin CSS/JS) ─────────────────────────────────────────
    location /static/ {
        proxy_pass       http://backend;
        proxy_set_header Host backend;
    }

    # ── Astro assets — cache agresivo (content-hashed por Astro) ─────────────
    location /_astro/ {
        expires 1y;
        add_header Cache-Control             "public, immutable";
        add_header X-Frame-Options           "DENY"                              always;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection          "1; mode=block"                     always;
        add_header Content-Security-Policy   $csp                                always;
    }

    # ── Frontend Astro estáticos ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control             "no-cache";
        add_header X-Frame-Options           "DENY"                              always;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection          "1; mode=block"                     always;
        add_header Content-Security-Policy   $csp                                always;
    }
}
