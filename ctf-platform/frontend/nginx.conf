server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Content-hashed assets — cache agresivo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — siempre fresh (Astro genera index.html por ruta)
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache";
    }
}
