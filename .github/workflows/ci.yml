name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ── Backend: pytest ────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ctf-platform/backend

    env:
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production-xxxxxxxxxxxxxxxx
      JWT_SIGNING_KEY: ci-jwt-key-not-used-in-production-xxxxxxxxxxxxxxxxxxxxxxx
      DJANGO_SETTINGS_MODULE: config.settings.testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ctf-platform/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=term-missing --cov-report=xml \
            --override-ini="addopts=--nomigrations -p no:warnings -v"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ctf-platform/backend/coverage.xml

  # ── Frontend: type-check + build ───────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ctf-platform/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ctf-platform/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (astro check)
        run: npm run astro -- check

      - name: Build
        run: npm run build

  # ── Docker: validate images build ─────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ctf-platform/backend
          push: false
          tags: ctf-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ctf-platform/frontend
          push: false
          tags: ctf-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
